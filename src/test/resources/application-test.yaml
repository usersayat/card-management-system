spring:
  datasource:
    url: jdbc:h2:mem:card_db_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop # База создается с нуля перед тестами и удаляется после
    show-sql: true